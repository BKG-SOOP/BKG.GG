<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BKG.GG</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>BKG.GG</h1>
      <button id="adminBtn" class="admin-btn" type="button">관리자 로그인</button>
    </header>

    <section class="filterbar" aria-label="월 선택 필터">
      <label class="month-control">
        <span>월 선택</span>
        <select id="monthSelect"></select>
      </label>

      <div class="filter-actions">
        <span id="connectStatus" class="connect-status">Firebase 연결 중...</span>
        <button id="refreshBtn" class="refresh-btn" type="button">새로고침</button>
      </div>
    </section>

    <main class="cards-layout" aria-label="멤버 카드 비교">
      <article class="member-card" data-card-index="0"></article>
      <article class="member-card" data-card-index="1"></article>
      <article class="member-card" data-card-index="2"></article>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">제목</h2>
        <button id="modalClose" class="close-btn" type="button">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
